version: "3.9"

# ─────────────────────────────────────────────────────────────
#  SODICOL — Stack de producción
#  Dominio: slscode.online  |  PHP 8.1 + Apache + MySQL 8
# ─────────────────────────────────────────────────────────────

services:

  # ── Apache + PHP ─────────────────────────────────────────────
  app:
    build:
      context: ..                    # raíz del proyecto
      dockerfile: docker/apache/Dockerfile
    container_name: sodicol_app
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DB_HOST: mysql
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
      DB_NAME: ${DB_NAME}
      SESSION_LIFETIME: ${SESSION_LIFETIME:-3600}
      COOKIE_SECURE: ${COOKIE_SECURE:-0}
      UPLOAD_MAX_SIZE: ${UPLOAD_MAX_SIZE:-5242880}
      ALLOWED_EXTENSIONS: ${ALLOWED_EXTENSIONS:-jpg,jpeg,png,gif,webp}
    volumes:
      - ../uploads:/var/www/html/uploads        # imágenes persistentes
      - ../logs:/var/www/html/logs               # logs PHP/Apache
      - php_sessions:/var/lib/php/sessions       # sesiones PHP
    networks:
      - sodicol_net
    expose:
      - "80"
    # Sin ports aquí: Nginx Proxy Manager expondrá este contenedor
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── MySQL 8 ───────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: sodicol_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASS}
    volumes:
      - mysql_data:/var/lib/mysql                # datos persistentes
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - sodicol_net
    expose:
      - "3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost",
             "-u", "root", "--password=${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── phpMyAdmin ────────────────────────────────────────────────
  phpmyadmin:
    image: phpmyadmin:5.2
    container_name: sodicol_phpmyadmin
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: ${DB_USER}
      PMA_PASSWORD: ${DB_PASS}
      UPLOAD_LIMIT: 64M
    networks:
      - sodicol_net
    expose:
      - "80"
    # Sin ports: Nginx Proxy Manager lo expondrá en un subdominio distinto

# ── Redes ─────────────────────────────────────────────────────
networks:
  sodicol_net:
    name: sodicol_network
    driver: bridge

# ── Volúmenes ─────────────────────────────────────────────────
volumes:
  mysql_data:
    name: sodicol_mysql_data
  php_sessions:
    name: sodicol_php_sessions
