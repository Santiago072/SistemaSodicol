<VirtualHost *:80>
    ServerName slscode.online
    ServerAlias www.slscode.online
    DocumentRoot /var/www/html

    # ── Directorio raíz ───────────────────────────────────────
    <Directory /var/www/html>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # ── Directorio de uploads: sin ejecución PHP ──────────────
    <Directory /var/www/html/uploads>
        Options -Indexes -ExecCGI
        AllowOverride None
        php_admin_flag engine off
        Require all granted
    </Directory>

    # ── Directorio de logs: acceso denegado ───────────────────
    <Directory /var/www/html/logs>
        Require all denied
    </Directory>

    # ── Logs ──────────────────────────────────────────────────
    ErrorLog  /var/www/html/logs/apache_error.log
    CustomLog /var/www/html/logs/apache_access.log combined

    # ── Cabeceras de seguridad ────────────────────────────────
    <IfModule mod_headers.c>
        Header always set X-Content-Type-Options "nosniff"
        Header always set X-Frame-Options "SAMEORIGIN"
        Header always set X-XSS-Protection "1; mode=block"
        Header always set Referrer-Policy "strict-origin-when-cross-origin"
        Header always set Permissions-Policy "geolocation=(), camera=(), microphone=()"
        # Agregar HSTS cuando se use HTTPS:
        # Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains"
    </IfModule>

    # ── Compresión ────────────────────────────────────────────
    <IfModule mod_deflate.c>
        AddOutputFilterByType DEFLATE text/html text/css application/javascript
    </IfModule>

    # ── Cache de activos estáticos ────────────────────────────
    <IfModule mod_expires.c>
        ExpiresActive On
        ExpiresByType image/png  "access plus 1 month"
        ExpiresByType image/jpeg "access plus 1 month"
        ExpiresByType image/gif  "access plus 1 month"
        ExpiresByType image/webp "access plus 1 month"
        ExpiresByType text/css   "access plus 1 week"
        ExpiresByType application/javascript "access plus 1 week"
    </IfModule>
</VirtualHost>
