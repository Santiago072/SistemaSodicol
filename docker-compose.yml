version: '3.8'

services:
  app:
    build: .
    container_name: sodicol_app
    restart: always
    environment:
      - PORT=${PORT:-80}
      - DB_HOST=${DB_HOST:-sodicol_db}
      - DB_NAME=${DB_NAME:-sistema_sodicol}
      - DB_USER=${DB_USER:-sodicol_user}
      - DB_PASS=${DB_PASS:-root}
      - SESSION_LIFETIME=${SESSION_LIFETIME:-3600}
      - COOKIE_SECURE=${COOKIE_SECURE:-0}
      - UPLOAD_MAX_SIZE=${UPLOAD_MAX_SIZE:-5242880}
      - ALLOWED_EXTENSIONS=${ALLOWED_EXTENSIONS:-jpg,jpeg,png,gif,webp}
    volumes:
      - sodicol_uploads:/var/www/html/uploads
      - sodicol_logs:/var/www/html/logs
    ports:
      - "8891:80"
    depends_on:
      - sodicol_db
    networks:
      - sodicol_network

  sodicol_db:
    image: mariadb:10.11
    container_name: sodicol_db
    restart: always
    environment:
      MARIADB_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MARIADB_DATABASE: ${DB_NAME:-sistema_sodicol}
      MARIADB_USER: ${DB_USER:-sodicol_user}
      MARIADB_PASSWORD: ${DB_PASS:-root}
    volumes:
      - db_data:/var/lib/mysql
      - ./BD.txt:/docker-entrypoint-initdb.d/BD.sql
    networks:
      - sodicol_network

volumes:
  sodicol_uploads:
  sodicol_logs:
  db_data:

networks:
  sodicol_network:
    external: true
